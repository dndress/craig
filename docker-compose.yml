services:
  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_PASSWORD: craig
      POSTGRES_DB: craig
      POSTGRES_USER: craig
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craig"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - 'db_data:/var/lib/postgresql/data'
    networks:
      default:
        aliases:
          # Stack-unique DNS name. The bare service name `db` collides with
          # Supabase's `db` service on the shared external `dokploy-network`,
          # so the bot was resolving `db` to Supabase's Postgres and failing
          # auth. Always reference this Postgres as `chronicler-db` in
          # DATABASE_URL. See CHRONICLER_NOTES.md ("db hostname collision").
          - chronicler-db
  redis:
    image: redis
    restart: always
  craig:
    build: .
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
    volumes:
      - 'craig_rec:/app/rec'
      - '../files/install.config:/app/install.config:ro'
volumes:
  db_data:
  craig_rec:
